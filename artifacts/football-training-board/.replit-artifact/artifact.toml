kind = "web"
previewPath = "/"
title = "Football Training Board"
version = "1.0.0"
id = "artifacts/football-training-board"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 19150
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/football-training-board run dev"

[services.env]
PORT = "19150"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/football-training-board", "run", "build"]
publicDir = "artifacts/football-training-board/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
